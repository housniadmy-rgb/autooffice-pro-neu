<!DOCTYPE html>

  <title data-i18n="pageTitle">Set password – PraxisOnline24</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg-light, #f8f9fa); }
    .sp-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .sp-card {
      background: #fff;
      border-radius: var(--radius-lg, 12px);
      box-shadow: var(--shadow-md, 0 4px 16px rgba(0,0,0,.08));
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }
    .sp-logo { text-align: center; margin-bottom: 1.75rem; }
    .sp-logo a { font-size: 1.25rem; font-weight: 700; color: var(--primary); text-decoration: none; }
    .sp-card h1 { font-size: 1.375rem; font-weight: 700; color: #111827; margin-bottom: .375rem; text-align: center; }
    .sp-subtitle { font-size: .875rem; color: #6b7280; text-align: center; margin-bottom: 1.75rem; }
    .sp-practice { font-size: .9375rem; font-weight: 600; color: #2563EB; text-align: center; margin-bottom: 1.25rem; }
    .sp-success {
      background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px;
      padding: 1.25rem; color: #2e7d32; text-align: center; display: none;
    }
    .sp-error {
      background: #fee2e2; border: 1px solid #fecaca; border-radius: 8px;
      padding: 1.25rem; color: #991b1b; text-align: center; margin-bottom: 1rem;
    }
    .sp-loading { text-align: center; color: #6b7280; padding: 2rem 0; }
    .sp-loading::after {
      content: ''; display: block; width: 28px; height: 28px;
      border: 2px solid #e5e7eb; border-top-color: #2563EB;
      border-radius: 50%; animation: spin .7s linear infinite; margin: .75rem auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 480px) { .sp-card { padding: 1.75rem 1.25rem; } }
    html[dir="rtl"] .sp-logo a, html[dir="rtl"] h1, html[dir="rtl"] .sp-subtitle { direction: rtl; }
  </style>
</head>
<body>
<div class="sp-wrap">
  <div class="sp-card">
    <div class="sp-logo"><a href="/">PraxisOnline24</a></div>

    <div id="sp-loading" class="sp-loading" data-i18n="checkingInvite">Verifying invitation…</div>

    <div id="sp-invalid" style="display:none;">
      <div class="sp-error" id="sp-error-msg" data-i18n="invalidLink">Invalid or expired link.</div>
      <p style="text-align:center;margin-top:1rem;">
        <a href="/login.html" data-i18n="backToLogin" style="color:#2563EB;font-size:.875rem;">← Back to login</a>
      </p>
    </div>

    <div id="sp-form-wrap" style="display:none;">
      <h1 data-i18n="heading">Set password</h1>
      <p class="sp-subtitle" data-i18n="subtitle">For your practice account at PraxisOnline24</p>
      <p class="sp-practice" id="sp-practice-name"></p>

      <div id="sp-alert" class="sp-error" style="display:none;"></div>

      <form id="sp-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="sp-password"><span data-i18n="newPasswordLabel">New password</span><span style="color:#dc3545;">*</span></label>
          <input id="sp-password" type="password" class="form-control" data-i18n-placeholder="minChars" placeholder="At least 8 characters" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label" for="sp-confirm"><span data-i18n="repeatPasswordLabel">Repeat password</span><span style="color:#dc3545;">*</span></label>
          <input id="sp-confirm" type="password" class="form-control" data-i18n-placeholder="repeatPasswordPh" placeholder="Enter password again" required autocomplete="new-password">
        </div>
        <button type="submit" id="sp-submit" class="btn btn-primary" data-i18n="submitButton" style="width:100%;margin-top:.5rem;">
          Set password &amp; activate account
        </button>
      </form>
    </div>

    <div id="sp-success" class="sp-success">
      <div style="font-size:2rem;margin-bottom:.5rem;">✓</div>
      <strong data-i18n="accountActivated">Account activated!</strong><br>
      <span data-i18n="successMessage">Your password has been saved. You can now log in.</span>
      <br><br>
      <a href="/login.html" class="btn btn-primary" data-i18n="toLogin" style="display:inline-block;padding:.625rem 1.5rem;">Go to login →</a>
    </div>
  </div>
</div>

      backToLogin: '← กลับไปที่หน้าเข้าสู่ระบบ',
      heading: 'ตั้งรหัสผ่าน',
      subtitle: 'สำหรับบัญชีคลินิกของคุณบน PraxisOnline24',
      newPasswordLabel: 'รหัสผ่านใหม่',
      minChars: 'อย่างน้อย 8 ตัวอักษร',
      repeatPasswordLabel: 'ยืนยันรหัสผ่าน',
      repeatPasswordPh: 'กรอกรหัสผ่านอีกครั้ง',
      submitButton: 'ตั้งรหัสผ่านและเปิดใช้งานบัญชี',
      submitting: '…',
      passwordTooShort: 'รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร',
      passwordsDontMatch: 'รหัสผ่านไม่ตรงกัน',
      activationError: 'การเปิดใช้งานล้มเหลว โปรดลองอีกครั้ง',
      networkError: 'ข้อผิดพลาดของเครือข่าย โปรดลองอีกครั้ง',
      accountActivated: 'เปิดใช้งานบัญชีแล้ว!',
      successMessage: 'บันทึกรหัสผ่านของคุณแล้ว ตอนนี้คุณสามารถเข้าสู่ระบบได้',
      toLogin: 'ไปที่หน้าเข้าสู่ระบบ →',
    },
  };

  const SUPPORTED = Object.keys(I18N); // 14 Codes
  const params = new URLSearchParams(location.search);
  const token  = params.get('token');
  const rawLang = String(params.get('lang') || '').toLowerCase();
  // Fallback: Englisch, wenn lang fehlt oder unbekannt ist.
  const lang = SUPPORTED.indexOf(rawLang) >= 0 ? rawLang : 'en';
  const t = I18N[lang];

  // <html lang> setzen + dir=rtl für Arabisch.
  document.documentElement.lang = lang;
  if (lang === 'ar') document.documentElement.dir = 'rtl';

  // Statische data-i18n-Knoten beschriften.
  document.querySelectorAll('[data-i18n]').forEach(function (el) {
    const key = el.dataset.i18n;
    if (t[key] != null) el.textContent = t[key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
    const key = el.dataset.i18nPlaceholder;
    if (t[key] != null) el.placeholder = t[key];
  });

  const elLoading  = document.getElementById('sp-loading');
  const elInvalid  = document.getElementById('sp-invalid');
  const elErrorMsg = document.getElementById('sp-error-msg');
  const elFormWrap = document.getElementById('sp-form-wrap');
  const elSuccess  = document.getElementById('sp-success');
  const elAlert    = document.getElementById('sp-alert');
  const elPractice = document.getElementById('sp-practice-name');

  if (!token) {
    elLoading.style.display = 'none';
    elErrorMsg.textContent = t.noToken;
    elInvalid.style.display = 'block';
    return;
  }

  // Token validieren
  fetch('/api/auth/invite/validate?token=' + encodeURIComponent(token))
    .then(function (r) { return r.json(); })
    .then(function (data) {
      elLoading.style.display = 'none';
      if (!data.valid) {
        elErrorMsg.textContent = data.error || t.invalidInviteLink;
        elInvalid.style.display = 'block';
        return;
      }
      if (data.practice_name) {
        elPractice.textContent = data.practice_name;
      }
      elFormWrap.style.display = 'block';
    })
    .catch(function () {
      elLoading.style.display = 'none';
      elErrorMsg.textContent = t.connectionError;
      elInvalid.style.display = 'block';
    });

  document.getElementById('sp-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    elAlert.style.display = 'none';

    const pw  = document.getElementById('sp-password').value;
    const pw2 = document.getElementById('sp-confirm').value;

    if (pw.length < 8) {
      elAlert.textContent = t.passwordTooShort;
      elAlert.style.display = 'block';
      return;
    }
    if (pw !== pw2) {
      elAlert.textContent = t.passwordsDontMatch;
      elAlert.style.display = 'block';
      return;
    }

    const btn = document.getElementById('sp-submit');
    btn.disabled = true;
    btn.textContent = t.submitting;

    try {
      const r = await fetch('/api/auth/invite/activate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, new_password: pw }),
      });
      const json = await r.json().catch(function () { return {}; });
      if (!r.ok) {
        elAlert.textContent = json.error || t.activationError;
        elAlert.style.display = 'block';
        btn.disabled = false;
        btn.textContent = t.submitButton;
        return;
      }
      elFormWrap.style.display = 'none';
      elSuccess.style.display = 'block';
    } catch (err) {
      elAlert.textContent = t.networkError;
      elAlert.style.display = 'block';
      btn.disabled = false;
      btn.textContent = t.submitButton;
    }
  });
})();
</script>
<script src="/js/password-toggle.js"></script>
</body>
</html>
